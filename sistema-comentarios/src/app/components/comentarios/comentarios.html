<div style="max-width: 600px; margin: 0 auto; padding: 10px;">
  
  <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(56,189,248,0.2); margin-bottom: 20px;">
    <h3 style="color: #38bdf8; margin-top: 0;">💬 Nuevo Comentario</h3>
    
    <input [(ngModel)]="newName" placeholder="Tu Nombre" 
           style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
    
    <textarea [(ngModel)]="newBody" placeholder="Escribe tu comentario..." rows="3"
              style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;"></textarea>
    
    <button (click)="enviarComentario()" 
            style="width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">
      PUBLICAR COMENTARIO
    </button>

    @if (statusMessage) {
      <p style="text-align: center; margin-top: 10px; font-size: 0.85rem; color: #4ade80;">{{ statusMessage }}</p>
    }
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h4 style="color: white; margin: 0;">Feed de Comentarios</h4>
    <span style="color: #38bdf8; font-weight: bold;">Total: {{ comments.length }}</span>
  </div>

  <div style="display: flex; flex-direction: column; gap: 10px;">
    @for (c of comments; track c.id) {
      <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border-left: 4px solid #38bdf8;">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 5px;">
          <strong style="color: #38bdf8; text-transform: uppercase;">{{ c.name }}</strong>
          <span style="color: #64748b;">
  {{ c.date | date:'dd/MM/yyyy HH:mm:ss' }}
</span>
        </div>
        <p style="color: #cbd5e1; margin: 0; font-size: 0.95rem;">{{ c.body }}</p>
      </div>
    }
  </div>
</div>
